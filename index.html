<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#040509" />
    <link rel="icon" type="image/svg+xml" href="/dist/favicon.svg" />
    <link rel="canonical" href="https://vivekrbot.github.io/Website26/" />
    <title>Itsvivek.Website</title>
    <meta name="description" content="Portfolio of Vivek Ramachandran — a product designer and strategist building experiences that are clear, crafted, and consequential." />
    <meta property="og:title" content="Vivek Ramachandran — Product Design & Strategy" />
    <meta property="og:description" content="Portfolio of Vivek Ramachandran — product designer and strategist." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vivekrbot.github.io/Website26/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vivek Ramachandran — Product Design & Strategy" />
    <meta name="twitter:description" content="Portfolio of Vivek Ramachandran — product designer and strategist." />
    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Anti-flicker: set theme before React loads -->
    <script>
      (function() {
        var s = localStorage.getItem('vr-theme');
        var d = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', s === 'light' || s === 'dark' ? s : d);
      })();
    </script>
    <!-- SPA deep-link decode: restore path encoded by 404.html -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
