<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vivek Ramachandran</title>
    <!--
      SPA deep-link fix for GitHub Pages.
      When Pages serves a 404 for any sub-route (e.g. /about, /works/slug),
      this script encodes the path into the query string and redirects to the
      root index.html, which then decodes it and pushes the correct history state.
      Based on the canonical approach: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var segmentCount = 0; // itsvivek.design is a custom domain served at root (0 = no /repo-name/ prefix)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
